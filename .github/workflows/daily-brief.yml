name: daily-brief

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: npm run classify:sample
