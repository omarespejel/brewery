<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Distillery maintenance control loop</title>
  <desc id="desc">A static diagram showing upstream sources flowing into Distillery, then Linear, Slack, GitHub CI, and human approval.</desc>
  <rect width="980" height="520" fill="#ffffff"/>
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
      .h1 { font-size: 19px; font-weight: 850; fill: #111827; }
      .sub { font-size: 14px; fill: #6b7280; }
      .label { font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .08em; }
      .body { font-size: 13px; fill: #374151; }
      .small { font-size: 11.5px; fill: #6b7280; }
      .card-title { font-size: 14px; font-weight: 850; fill: #111827; }
      .muted-title { font-size: 13px; font-weight: 800; fill: #4b5563; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#4b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="70" y="58" class="h1">Distillery turns upstream change into proved maintenance work</text>
  <text x="70" y="86" class="sub">The system is not a chatbot. It is a control loop: watch, classify, file, fix, verify, approve.</text>

  <rect x="70" y="130" width="230" height="260" rx="26" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="100" y="168" class="label" fill="#1d4ed8">upstream causes</text>
  <text x="100" y="202" class="body">Starknet specs</text>
  <text x="100" y="231" class="body">Cairo and Scarb releases</text>
  <text x="100" y="260" class="body">Pathfinder and Juno changes</text>
  <text x="100" y="289" class="body">Foundry and tooling updates</text>
  <text x="100" y="318" class="body">StarkWare Slack signals</text>
  <text x="100" y="347" class="body">PostHog and Sentry feedback</text>

  <path d="M312 260 L386 260" stroke="#4b5563" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="400" y="122" width="240" height="276" rx="30" fill="#ecfdf5" stroke="#86efac" stroke-width="2.2"/>
  <text x="430" y="162" class="label" fill="#047857">distillery core</text>
  <rect x="430" y="190" width="180" height="38" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="520" y="214" text-anchor="middle" class="muted-title">collect signals</text>
  <rect x="430" y="242" width="180" height="38" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="520" y="266" text-anchor="middle" class="muted-title">dedupe and score</text>
  <rect x="430" y="294" width="180" height="38" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="520" y="318" text-anchor="middle" class="muted-title">assign confidence</text>
  <rect x="430" y="346" width="180" height="38" rx="10" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="520" y="370" text-anchor="middle" class="muted-title">route work</text>

  <path d="M652 260 L714 260" stroke="#4b5563" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="730" y="110" width="180" height="78" rx="18" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="820" y="141" text-anchor="middle" class="card-title" fill="#6d28d9">Linear</text>
  <text x="820" y="166" text-anchor="middle" class="small">durable queue and memory</text>

  <rect x="730" y="218" width="180" height="78" rx="18" fill="#fff7ed" stroke="#f4b46f" stroke-width="2"/>
  <text x="820" y="249" text-anchor="middle" class="card-title" fill="#b45309">Slack</text>
  <text x="820" y="274" text-anchor="middle" class="small">digest, alerts, approvals</text>

  <rect x="730" y="326" width="180" height="78" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="820" y="357" text-anchor="middle" class="card-title">GitHub and CI</text>
  <text x="820" y="382" text-anchor="middle" class="small">PRs, canaries, proof</text>

  <path d="M820 188 L820 218" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 6"/>
  <path d="M820 296 L820 326" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5 6"/>

  <rect x="172" y="430" width="636" height="54" rx="18" fill="#f8fafc" stroke="#e5e7eb" stroke-width="2"/>
  <text x="490" y="462" text-anchor="middle" font-size="14" font-weight="850" fill="#111827">Agents do the labor. Distillery keeps evidence, ownership, and human-controlled gates.</text>
</svg>
